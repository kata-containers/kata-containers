---
apiVersion: v1
kind: ServiceAccount
metadata:
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-sa-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-sa
{{- end }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # Keep so DaemonSet pods retain API access during uninstall (SIGTERM cleanup).
    helm.sh/resource-policy: keep
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-role-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-role
{{- end }}
  annotations:
    helm.sh/resource-policy: keep
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "patch"]
- apiGroups: ["node.k8s.io"]
  resources: ["runtimeclasses"]
  verbs: ["get", "list", "patch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list"]
- apiGroups: ["nfd.k8s-sigs.io"]
  resources: ["nodefeaturerules"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-rb-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-rb
{{- end }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-role-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-role
{{- end }}
subjects:
- kind: ServiceAccount
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-sa-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-sa
{{- end }}
  namespace: {{ .Release.Namespace }}
{{- if eq (.Values.deploymentMode | default "daemonset") "job" }}
---
# Dedicated, least-privilege identity for the job-mode dispatcher
# (kata-deploy-job-dispatcher). It is a pure control-plane client: it lists nodes
# (cluster-scoped) and manages per-node Jobs in the release namespace
# (namespace-scoped). It deliberately does NOT get the privileged kata-deploy
# host-mutation rights (node patch, runtimeclasses, NFD, etc.); those stay on
# kata-deploy-sa, which only the per-node Jobs use.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kata-deploy.dispatcherServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Chart.Name }}-dispatcher-noderole{{ with .Values.env.multiInstallSuffix }}-{{ . }}{{ end }}
rules:
# Enumerating nodes is inherently cluster-scoped.
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Chart.Name }}-dispatcher-noderb{{ with .Values.env.multiInstallSuffix }}-{{ . }}{{ end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Chart.Name }}-dispatcher-noderole{{ with .Values.env.multiInstallSuffix }}-{{ . }}{{ end }}
subjects:
- kind: ServiceAccount
  name: {{ include "kata-deploy.dispatcherServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Chart.Name }}-dispatcher-role{{ with .Values.env.multiInstallSuffix }}-{{ . }}{{ end }}
  namespace: {{ .Release.Namespace }}
rules:
# The dispatcher only ever creates, polls, and deletes per-node Jobs in its own namespace.
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "delete"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Chart.Name }}-dispatcher-rb{{ with .Values.env.multiInstallSuffix }}-{{ . }}{{ end }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Chart.Name }}-dispatcher-role{{ with .Values.env.multiInstallSuffix }}-{{ . }}{{ end }}
subjects:
- kind: ServiceAccount
  name: {{ include "kata-deploy.dispatcherServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
---
# ServiceAccount and RBAC for the post-delete Job that removes the kept RBAC above.
# Created as post-delete hooks with lower weight than the Job so they exist when the Job runs.
apiVersion: v1
kind: ServiceAccount
metadata:
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-sa-cleanup-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-sa-cleanup
{{- end }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-cleanup-role-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-cleanup-role
{{- end }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
  verbs: ["delete"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["delete"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-cleanup-rb-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-cleanup-rb
{{- end }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-cleanup-role-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-cleanup-role
{{- end }}
subjects:
- kind: ServiceAccount
{{- if .Values.env.multiInstallSuffix }}
  name: {{ .Chart.Name }}-sa-cleanup-{{ .Values.env.multiInstallSuffix }}
{{- else }}
  name: {{ .Chart.Name }}-sa-cleanup
{{- end }}
  namespace: {{ .Release.Namespace }}
