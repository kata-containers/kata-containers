runtimeClasses:
  enabled: false
  createDefault: false

customRuntimes:
  enabled: true
  runtimes:
    clh-azure:
      baseConfig: "clh"
      dropIn: |
        [runtime]
        static_sandbox_resource_mgmt = true

        [hypervisor.clh]
        path = "/opt/kata/bin/cloud-hypervisor-glibc"
        image = "/opt/kata/share/kata-containers/kata-containers-mariner.img"
        valid_hypervisor_paths = ["/opt/kata/bin/cloud-hypervisor-glibc"]
      runtimeClass: |
        kind: RuntimeClass
        apiVersion: node.k8s.io/v1
        metadata:
          name: kata
          labels:
            app.kubernetes.io/managed-by: kata-deploy
        handler: kata-clh-azure
        scheduling:
          nodeSelector:
            katacontainers.io/kata-runtime: "true"
      containerd:
        snapshotter: ""
      crio:
        pullType: ""
