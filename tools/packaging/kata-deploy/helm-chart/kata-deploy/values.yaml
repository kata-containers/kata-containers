# Deployment model for installing/cleaning up Kata on nodes.
#   daemonset: (default) the long-running kata-deploy DaemonSet installs Kata on
#              every matching node and reverts it on pod termination (uninstall).
#   job:       no always-on component. A tiny dispatcher Job (the dispatcher,
#              kata-deploy-job-dispatcher) runs as a post-install/upgrade hook, enumerates
#              the selected nodes LIVE, and creates one node-pinned install Job
#              per node - paced to job.parallelism and guaranteeing one install
#              per node. Each per-node Job runs the staged pipeline as ordered
#              initContainers and exits. Uninstall works the same way via a
#              pre-delete dispatcher (reverse pipeline).
#
# Why a dispatcher instead of rendering per-node Jobs in the chart: Helm stores
# the whole rendered release in one ~1 MiB Secret and runs hook resources
# sequentially, and neither an Indexed Job nor a JobSet can guarantee one pod
# per node once parallelism < node-count (the scheduler ignores completed pods
# when balancing spread). The dispatcher keeps the release O(1), enumerates nodes
# at run time, and paces a guaranteed-coverage rollout with built-in Jobs only.
#
# NOTE on "job" mode and new nodes:
#   The dispatcher only runs on `helm install` / `helm upgrade` / `helm uninstall`.
#   When you add nodes later, re-run `helm upgrade` so the dispatcher enumerates
#   and installs the new nodes (the staged actions are idempotent, so already-
#   installed nodes are skipped). This is intentional: it avoids an always-on
#   privileged component on every node.
deploymentMode: daemonset  # daemonset | job

# Settings specific to deploymentMode: job
job:
  # Dispatcher image: the dispatcher that fans out per-node Jobs. It only talks to
  # the Kubernetes API (lists nodes, creates/watches Jobs); it never touches the
  # host. Supports reference:tag or reference@sha256:digest; tag defaults to the
  # chart appVersion.
  dispatcherImage:
    reference: quay.io/kata-containers/kata-deploy-job-dispatcher
    tag: ""
  # Maximum number of nodes processed concurrently (the dispatcher keeps at most
  # this many per-node Jobs in flight, refilling as they finish). Lower it to
  # pace the rollout (e.g. limit how many CRI runtimes restart at once on a big
  # fleet); raise it to install faster. Effectively capped at the node count.
  parallelism: 100
  # How to choose which nodes get a per-node INSTALL Job. Precedence:
  #   1. job.nodes (explicit list of node names) - if non-empty, used verbatim
  #      (passed to the dispatcher as --nodes).
  #   2. otherwise a label selector built from job.nodeSelector (equality) ANDed
  #      with job.nodeSelectorExpressions (In/NotIn/Exists/DoesNotExist) is
  #      passed to the dispatcher, which resolves matching nodes LIVE at run time.
  #   3. if both are empty, ALL nodes are targeted.
  #
  # DEFAULT: target worker (non-control-plane) nodes, so no custom labeling is
  # required. Override these freely:
  #   - Target nodes with a specific label:
  #       job:
  #         nodeSelector: { kata-containers: "enabled" }
  #   - Target every node (including control-plane), e.g. single-node clusters/CI:
  #       job:
  #         nodeSelectorExpressions: []
  #   - Richer expressions:
  #       job:
  #         nodeSelectorExpressions:
  #           - { key: kubernetes.io/os, operator: In, values: ["linux"] }
  #           - { key: node-role.kubernetes.io/control-plane, operator: DoesNotExist }
  #   - Pin to explicit nodes:
  #       job:
  #         nodes: ["worker-1", "worker-2"]
  nodes: []
  # Equality label selector (ANDed with nodeSelectorExpressions). Ignored when
  # job.nodes is set. Empty by default.
  nodeSelector: {}
  # Kubernetes-style label selector requirements (ANDed with nodeSelector).
  # Each entry: { key, operator, values }. operator is one of:
  #   In | NotIn (values required) | Exists | DoesNotExist (values must be empty).
  # Default selects nodes that are NOT control-plane/master (i.e. worker nodes).
  # Set to [] to disable role filtering and target all discovered nodes.
  nodeSelectorExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
    - key: node-role.kubernetes.io/master
      operator: DoesNotExist
  # Node selection for the UNINSTALL (pre-delete hook) dispatcher. Same precedence
  # and semantics as install (cleanup.nodes, else cleanup.nodeSelector ANDed with
  # cleanup.nodeSelectorExpressions, else all nodes).
  #
  # The cleanup dispatcher resolves nodes LIVE when it runs at `helm uninstall`
  # (the dispatcher does the lookup), so - unlike a frozen Helm-rendered hook -
  # the DEFAULT below can safely be "nodes carrying katacontainers.io/kata-runtime",
  # i.e. exactly the nodes install actually labeled. Override to clean a
  # different set, e.g.:
  #   job:
  #     cleanup:
  #       nodes: ["worker-1"]
  cleanup:
    nodes: []
    nodeSelector: {}
    nodeSelectorExpressions:
      - key: katacontainers.io/kata-runtime
        operator: Exists
  # How long finished per-node Jobs are retained before automatic garbage
  # collection (seconds). Applies to both install and cleanup per-node Jobs.
  ttlSecondsAfterFinished: 600
  # Per-node retry budget: retries for a single node's Job before it is marked
  # failed. One node failing never aborts the others.
  backoffLimit: 3

imagePullPolicy: Always

imagePullSecrets: []

image:
  reference: quay.io/kata-containers/kata-deploy
  tag: ""

kubectlImage:
  reference: quay.io/kata-containers/kubectl
  tag: latest

monitor:
  enabled: false
  image:
    reference: quay.io/kata-containers/kata-monitor
    tag: ""
  listenAddress: "0.0.0.0:8090"
  runtimeEndpoint: "unix:///run/containerd/containerd.sock"
  logLevel: "info"
  port: 8090
  securityContext:
    privileged: false
    runAsUser: 0
    runAsGroup: 0
  resources:
    limits:
      cpu: 200m
      memory: 300Mi
    requests:
      cpu: 200m
      memory: 300Mi

k8sDistribution: "k8s"  # k8s, k3s, rke2, k0s, microk8s

# Containerd configuration overrides
# These override the auto-detected paths based on k8sDistribution.
# Use these when your containerd setup doesn't match any built-in distribution preset.
containerd:
  # Override the host directory where containerd config lives.
  # When empty, derived automatically from k8sDistribution.
  # Example: "/etc/my-containerd/"
  configDir: ""
  # Override the containerd config file name.
  # When empty, the kata-deploy binary uses its built-in default ("config.toml")
  # or auto-detects based on the runtime (k0s, microk8s, k3s/rke2).
  # Example: "my-config.toml"
  configFileName: ""
  # Optional user-provided containerd drop-in TOML content.
  # This is written as an extra drop-in loaded after kata-deploy's generated drop-in,
  # so user keys can override kata-deploy defaults.
  # Example: set erofs snapshotter default size to zero:
  # userDropIn: |
  #   [plugins.'io.containerd.snapshotter.v1.erofs']
  #     default_size = 0
  userDropIn: ""

# Node selector and tolerations to control which nodes the kata-deploy daemonset runs on
# Examples:
# nodeSelector:
#   kata-containers: "enabled"
#   node-type: "worker"
# tolerations:
#   - key: "reservedFor"
#     operator: "Exists"
#     effect: "NoSchedule"
nodeSelector: {}
tolerations: []

# Startup taints to remove from a node once Kata is installed on it and the node
# has been labeled katacontainers.io/kata-runtime=true (the final install step).
#
# This closes a scheduling race: kata-deploy installs the runtime asynchronously
# via a DaemonSet (or per-node Jobs), so on a freshly provisioned node a pod that
# requests a Kata RuntimeClass can be scheduled before the runtime binaries exist
# and fail to start. Provision such nodes with a startup taint that keeps Kata
# workloads off them, list that taint here, and kata-deploy will remove it only
# after the runtime is ready, at which point the scheduler admits the workloads.
#
# Each entry is either a bare taint key (removes that key for ANY effect) or
# "key:effect" (removes only the taint with that key AND effect). Removal is
# best-effort and idempotent: a taint that is already absent is simply skipped,
# and a failure to remove leaves the taint in place (workloads stay gated) rather
# than admitting them prematurely.
#
# For this to work, kata-deploy itself must tolerate the taint so its own pods can
# land on the node. Add a matching entry under `tolerations` above.
#
# Example (pairs with a Karpenter NodePool `startupTaints` entry of the same key):
#   tolerations:
#     - key: "katacontainers.io/kata-runtime"
#       operator: "Exists"
#       effect: "NoSchedule"
#   startupTaints:
#     - "katacontainers.io/kata-runtime:NoSchedule"
startupTaints: []

# Extra labels for the kata-deploy DaemonSet pods (in addition to the
# required "name: kata-deploy" label used by the chart). A "name" key here
# is ignored.
# Examples:
# podLabels:
#   team: platform
podLabels: {}

# Annotations for the kata-deploy DaemonSet pods.
# Examples:
# podAnnotations:
#   prometheus.io/scrape: "false"
podAnnotations: {}

# Affinity rules for the kata-deploy DaemonSet.
# nodeSelector matches exact key/value pairs; affinity supports matchExpressions
# and rules about other pods on the same node (e.g. podAntiAffinity).
# When node-feature-discovery.enabled=true, the chart merges in a virtualization
# nodeAffinity rule. User required nodeSelectorTerms are AND-combined with the
# built-in virtualization terms; multiple user required terms remain OR among
# themselves. NFD virtualization requirements cannot be bypassed. podAffinity,
# podAntiAffinity, and preferredDuringSchedulingIgnoredDuringExecution pass through.
# Examples:
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#         - matchExpressions:
#             - key: node.cloud/reserved
#               operator: In
#               values:
#                 - platform-team
#   podAntiAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       - labelSelector:
#           matchExpressions:
#             - key: app
#               operator: In
#               values:
#                 - gpu-operator
#         topologyKey: kubernetes.io/hostname
affinity: {}

# Priority class name for the kata-deploy DaemonSet pods.
#
# kata-deploy is an infrastructure DaemonSet that installs Kata runtime
# artifacts on every node. If it gets evicted under node pressure, the
# node loses its Kata runtime until the pod is rescheduled. Setting a
# high-priority class prevents the kubelet from evicting kata-deploy
# before lower-priority workloads.
#
# Kubernetes ships "system-node-critical" and "system-cluster-critical"
# PriorityClasses by default. You can also create your own.
#
# Examples:
# priorityClassName: system-node-critical
# priorityClassName: system-cluster-critical
# priorityClassName: my-custom-priority-class
priorityClassName: "system-node-critical"

# Update strategy for the kata-deploy DaemonSet
# Default is RollingUpdate with maxUnavailable: 1
# Examples:
# updateStrategy:
#   type: OnDelete
# updateStrategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 25%
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Resource requests/limits for the kata-deploy container.
#
# kata-deploy does its real work (host file copies, kubeconfig parsing,
# apiserver calls, snapshotter setup) once at pod start and then re-execs
# into a tiny waiter that just blocks on SIGTERM.
#
# Defaults sized from real measurements: VmRSS of the unpatched binary on
# a ~220-vCPU node tops out under 10 MiB, and the patched post-re-exec
# waiter is smaller still. 16Mi is roughly 2x that headroom.
#
# No memory limit is set by default. During the install phase the kernel
# page cache for artifact copies can peak well above any reasonable fixed
# limit (e.g. the CoCo/nydus CI image is ~1.6 GiB), causing OOMKill if a
# limit is applied. Operators who want to cap memory on the post-install
# waiter can override this field.
#
# Set to {} to remove all requests/limits, or override individual fields.
resources:
  requests:
    cpu: 25m
    memory: 16Mi

debug: false

# Optional CLI log level override for kata-deploy.
# Supported values: error, warn, info, debug, trace
# When empty, debug:true implies --log-level debug; otherwise kata-deploy falls
# back to DEBUG env var behavior.
logLevel: ""

# Health probes for the kata-deploy DaemonSet.
# The binary runs an HTTP health server exposing /healthz (liveness) and /readyz (readiness).
# /healthz returns 200 as soon as the server starts (process is alive).
# /readyz returns 200 only after install completes; 503 while installing.
#
# The startup probe uses /readyz so it only passes once install completes. While
# the startup probe is active the liveness probe is suppressed, giving install up
# to failureThreshold * periodSeconds (default 20 min) before the kubelet kills
# the container. Without a startup probe the liveness probe would fire immediately.
#
# The 20-min budget covers slow GitHub-hosted free runners — single-node kubeadm
# clusters on small Azure VMs, where artifact extraction and `systemctl restart
# containerd` (which restarts the apiserver static pod with it) can push install
# past the 15-min mark (seen on dragonball + lts containerd matrix jobs). On
# real multi-node clusters install completes in tens of seconds, so the only cost
# of the wider deadline is a longer wait on a genuinely-broken pod.
#
# The readiness probe makes rolling updates safer: the DaemonSet controller waits for
# a pod to become ready before proceeding to the next node (respecting maxUnavailable).
health:
  port: 8090
  startupProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 10
    failureThreshold: 60
    timeoutSeconds: 3
  livenessProbe:
    enabled: true
    periodSeconds: 30
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    enabled: true
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3

snapshotter:
  setup: ["nydus"]  # ["nydus", "erofs"] or []
  # EROFS merge mode: "merged" (default) or "unmerged".
  #
  # "merged" forces containerd's erofs snapshotter to merge all image layers
  # into a single fsmeta.erofs (max_unmerged_layers = 0). This layout is only
  # supported by runtime-rs shims.
  #
  # "unmerged" leaves max_unmerged_layers at the containerd default so each
  # image layer is exposed as its own per-layer layer.erofs. This is the only
  # layout the Go runtime can consume, so set this when mapping a Go shim to the
  # erofs snapshotter. When empty, kata-deploy uses its built-in default
  # (merged).
  erofsMergeMode: ""
  # EROFS snapshotter mode. Controls the rw-layer backing strategy.
  # Valid values: "" (default), "disk", or "memory".
  erofsSnapshotterMode: ""
  # Enable dm-verity integrity verification for EROFS lower layers.
  # Independent of erofsSnapshotterMode — works with both disk and memory.
  erofsDmverity: false

# Shim configuration
# By default (disableAll: false), all shims with enabled: ~ (null) are enabled.
# Set disableAll: true to disable all shims, then explicitly enable specific ones:
#   shims:
#     disableAll: true
#     qemu:
#       enabled: true  # Only qemu is enabled
#
# All configurable keys per shim (all optional unless noted):
#   shims:
#     <shim-name>:
#       enabled: ~                    # true | false | ~ (null = follow disableAll)
#       dropIn: ""                    # optional Kata TOML drop-in applied as 50-user-overrides.toml
#       supportedArches:              # list of supported architectures
#         - amd64
#       allowedHypervisorAnnotations: []  # hypervisor annotations to pass through
#       containerd:
#         snapshotter: ""             # e.g. nydus, erofs, devmapper, or "" for default
#         forceGuestPull: false       # force guest-side image pull in containerd
#       crio:
#         guestPull: false            # enable guest-pull in CRI-O
#       agent:
#         httpsProxy: ""             # HTTPS proxy for the Kata agent
#         noProxy: ""                # no-proxy list for the Kata agent
#       runtimeClass:
#         nodeSelector:              # extra node selectors added to the RuntimeClass
#           example.io/feature: "true"
#         overheadEnabled: true      # enable/disable overhead in RuntimeClass (default: inherits from runtimeClasses.overheadEnabled)
#         overhead:                  # override pod overhead (falls back to built-in defaults)
#           memory: "160Mi"
#           cpu: "250m"
shims:
  disableAll: false

  clh:
    enabled: ~  # null = use disableAll setting (enabled when false, disabled when true)
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  clh-azure:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  clh-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  clh-azure-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  dragonball:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  fc:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: "devmapper" # requires pre-configuration on the user side

  qemu:
    enabled: ~
    supportedArches:
      - amd64
      - arm64
      - s390x
      - ppc64le
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  qemu-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
      - arm64
      - s390x
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  qemu-nvidia-cpu:
    enabled: ~
    supportedArches:
      - amd64
      - arm64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  qemu-nvidia-cpu-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
      - arm64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""

  qemu-nvidia-gpu:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""
    runtimeClass:
      # This label is automatically added by gpu-operator. Override it
      # if you want to use a different label.
      nodeSelector:
        nvidia.com/cc.ready.state: "false"

  qemu-nvidia-gpu-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
      - arm64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""
    runtimeClass:
      # This label is automatically added by gpu-operator. Override it
      # if you want to use a different label.
      nodeSelector:
        nvidia.com/cc.ready.state: "false"

  qemu-nvidia-gpu-snp:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: "nydus"
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""
    runtimeClass:
      # These labels are automatically added by gpu-operator and NFD
      # respectively. Override if you want to use a different label.
      # If you don't have NFD, you need to add the snp label by other
      # means to your SNP nodes.
      nodeSelector:
        nvidia.com/cc.ready.state: "true"
        amd.feature.node.kubernetes.io/snp: "true"

  qemu-nvidia-gpu-snp-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: "nydus"
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""
    runtimeClass:
      nodeSelector:
        nvidia.com/cc.ready.state: "true"
        amd.feature.node.kubernetes.io/snp: "true"

  qemu-nvidia-gpu-tdx:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: "nydus"
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""
    runtimeClass:
      # These labels are automatically added by gpu-operator and NFD
      # respectively. Override if you want to use a different label.
      # If you don't have NFD, you need to add the tdx label by other
      # means to your TDX nodes.
      nodeSelector:
        nvidia.com/cc.ready.state: "true"
        intel.feature.node.kubernetes.io/tdx: "true"

  qemu-nvidia-gpu-tdx-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: "nydus"
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""
    runtimeClass:
      nodeSelector:
        nvidia.com/cc.ready.state: "true"
        intel.feature.node.kubernetes.io/tdx: "true"

  qemu-snp:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  qemu-snp-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  qemu-tdx:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  qemu-tdx-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  qemu-se:
    enabled: ~
    supportedArches:
      - s390x
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  qemu-se-runtime-rs:
    enabled: ~
    supportedArches:
      - s390x
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  qemu-coco-dev:
    enabled: ~
    supportedArches:
      - amd64
      - s390x
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  qemu-coco-dev-runtime-rs:
    enabled: ~
    supportedArches:
      - amd64
      - arm64
      - s390x
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: nydus
      forceGuestPull: false
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

  remote:
    enabled: false
    supportedArches:
      - amd64
      - ppc64le
      - s390x
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: "nydus"
    crio:
      guestPull: true
    agent:
      httpsProxy: ""
      noProxy: ""

# Default shim per architecture
#
# Since the Kata Containers 4.0 release, the Rust runtime (runtime-rs,
# "qemu-runtime-rs") is the default on every architecture that ships a
# runtime-rs build. ppc64le has no runtime-rs build yet, so it stays on the
# Go runtime ("qemu"). The Go runtime remains supported (no new features are
# being added) and selectable (e.g. RuntimeClass "kata-qemu"); see the
# deprecation notice in docs/migrating-config-go-runtime-to-runtime-rs.md.
defaultShim:
  amd64: qemu-runtime-rs
  arm64: qemu-runtime-rs
  s390x: qemu-runtime-rs
  ppc64le: qemu

runtimeClasses:
  enabled: true
  createDefault: false
  defaultName: "kata"
  # Global switch for overhead in all RuntimeClasses (default: true)
  # Set to false to disable overhead for all shims globally.
  # Individual shims can override this via shims.<name>.runtimeClass.overheadEnabled
  overheadEnabled: true

env:
  installationPrefix: ""
  hostOS: ""
  # Suffix for multi-install deployments to avoid conflicts between multiple Kata installations
  # NOTE: When set, the default RuntimeClass (runtimeClasses.createDefault) will NOT be created
  #       to avoid naming conflicts. Use fully qualified RuntimeClass names (e.g., kata-qemu-suffix1).
  multiInstallSuffix: ""

# Node Feature Discovery (NFD) configuration
# node-feature-discovery is used to detect hardware features, including virtualization support
#
# When enabled, kata-deploy will manage NFD as a subchart and enforce virtualization checks:
#   - x86_64: Requires Intel VT-x (VMX) or AMD-V (SVM) CPU features
#   - aarch64, s390x, ppc64le, riscv64: Always allowed (specific virt detection not yet implemented)
#
# NFD will use its default configuration which includes detecting CPU features like VMX and SVM
#
# IMPORTANT: If you already have node-feature-discovery installed independently in your
#            cluster, keep this disabled.
#
#            When disabled, NO virtualization checks will be enforced (we **DO NOT**
#            control any external node-feature-discovery configuration).
#
#            If you want virtualization checks with an external node-feature-discovery
#            deployment, use nodeSelector manually.
node-feature-discovery:
  enabled: false

# Verification
# Post-install verification to validate Kata Containers is working correctly.
# When a pod spec is provided, runs a verification pod after installation.
#
# Provide your own pod YAML that validates your specific deployment requirements.
#
verification:
  # Namespace where verification pod will be created
  namespace: default

  # Timeout for the verification pod itself to complete (seconds)
  # This is how long to wait for the verification pod to run and finish successfully.
  # Default: 180s (3 minutes)
  timeout: 180

  # Timeout for kata-deploy DaemonSet rollout (seconds)
  # This includes waiting for the kata-deploy image to be pulled from the registry
  # and pods to start. Large images over slow networks may need more time.
  # Default: 1200s (20 minutes)
  daemonsetTimeout: 1200

  # Pod spec for verification (optional)
  # If provided, a verification job will run after install/upgrade.
  # If empty, no verification is performed.
  #
  # Provide your own pod YAML that validates your deployment works correctly.
  # The pod must:
  #   - Have metadata.name set
  #   - Include the correct runtimeClassName (e.g., kata-qemu, kata-qemu-snp)
  #   - Include any annotations needed (e.g., cc_init_data for CoCo)
  #   - Exit 0 on success, non-zero on failure
  #
  # Usage:
  #   helm install kata-deploy ... \
  #     --set-file verification.pod=/path/to/your-verification-pod.yaml
  #
  pod: ""

# Custom Runtimes - bring your own RuntimeClass with base config + drop-in overrides
# Each custom runtime uses an existing Kata config as a base and applies user overrides
# via Kata's config.d drop-in mechanism.
#
# IMPORTANT: The base config is copied AFTER kata-deploy has applied its modifications
# (debug, proxy, annotations). Custom runtimes inherit these settings from their base.
# RuntimeClass overhead defaults are also inherited from baseConfig when not set.
# Set inheritBaseOverhead: false to disable that inheritance for a custom runtime.
#
# Usage with values file (recommended):
#   Create a custom-runtimes.values.yaml file:
#
#   customRuntimes:
#     enabled: true
#     runtimes:
#       my-gpu-runtime:
#         baseConfig: "qemu-nvidia-gpu"  # Required: existing config to use as base
#         dropIn: |                       # Optional: overrides via config.d mechanism
#           [hypervisor.qemu]
#           default_memory = 1024
#           default_vcpus = 4
#         runtimeClass: |
#           kind: RuntimeClass
#           apiVersion: node.k8s.io/v1
#           metadata:
#             name: kata-my-gpu-runtime
#             labels:
#               app.kubernetes.io/managed-by: kata-deploy
#           handler: kata-my-gpu-runtime
#           overhead:
#             podFixed:
#               memory: "640Mi"
#               cpu: "500m"
#           scheduling:
#             nodeSelector:
#               katacontainers.io/kata-runtime: "true"
#         inheritBaseOverhead: true        # Optional: set false to remove inherited overhead
#         # Optional: CRI-specific configuration
#         containerd:
#           snapshotter: "nydus"  # Configure containerd snapshotter (nydus, erofs, etc.)
#         crio:
#           pullType: "guest-pull"  # Configure CRI-O runtime_pull_image = true
#
#   Then deploy with:
#     helm install kata-deploy ./kata-deploy -f custom-runtimes.values.yaml
#
# Available base configs: qemu, qemu-nvidia-gpu, qemu-snp, qemu-tdx, clh-runtime-rs, fc, etc.
# The correct shim binary is automatically selected based on the baseConfig.
#
customRuntimes:
  enabled: false
  runtimes: {}
  # Example structure:
  # runtimes:
  #   my-runtime:
  #     baseConfig: "qemu-nvidia-gpu"   # Required: base config name
  #     dropIn: ""                      # Optional: TOML overrides for config.d
  #     runtimeClass: |
  #       <full RuntimeClass YAML>
  #     inheritBaseOverhead: true       # Optional: set false to avoid baseConfig overhead inheritance
  #     containerd:
  #       snapshotter: ""  # Optional: nydus, erofs, or empty for default
  #     crio:
  #       pullType: ""  # Optional: guest-pull or empty for default
