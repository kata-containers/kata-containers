---
apiVersion: v1
kind: Pod
metadata:
  name: simple-pod
spec:
  restartPolicy: Never
  runtimeClassName: kata-cc
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    supplementalGroups:
      - 10
  containers:
    - name: busybox
      image: "quay.io/prometheus/busybox:latest"
      command:
        - /bin/sh
      args:
        - "-c"
        - echo hello
