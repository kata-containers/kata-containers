[package]
authors = ["The Kata Containers community <kata-dev@lists.katacontainers.io>"]
edition = "2018"
license = "Apache-2.0"
name    = "hypervisor"
version = "0.1.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix-rt          = "2.7.0"
anyhow            = "^1.0"
async-trait       = "0.1.48"
crossbeam-channel = "0.5.6"
futures           = "0.3.25"
go-flag           = "0.1.0"
hyper             = { version = "0.14.18", features = ["client"] }
hyperlocal        = "0.8.0"
lazy_static       = "1.4"
libc              = ">=0.2.39"
nix               = "0.24.2"
oci-spec          = { version = "0.6.8", features = ["runtime"] }
path-clean        = "1.0.1"
protobuf          = "=3.7.1"
qapi              = { version = "0.14", features = ["async-tokio-all", "qmp"] }
qapi-qmp          = "0.14.0"
qapi-spec         = "0.3.1"
rand              = "0.8.4"
rust-ini          = "0.18.0"
safe-path         = "0.1.0"
seccompiler       = "0.2.0"
serde             = { version = "1.0.138", features = ["derive"] }
serde_json        = ">=1.0.9"
slog              = "2.5.2"
slog-scope        = "4.4.0"
tempdir           = "0.3.7"
thiserror         = "1.0"
tokio             = { version = "1.38.0", features = ["fs", "io-util", "process", "sync"] }
tracing           = "0.1.36"
ttrpc             = { version = "0.8.4", features = ["async"] }
vmm-sys-util      = "0.11.0"

# Local dependencies
ch-config      = { workspace = true, optional = true }
kata-sys-util  = { workspace = true }
kata-types     = { workspace = true }
logging        = { workspace = true }
persist        = { workspace = true }
protocols      = { workspace = true, features = ["async"] }
shim-interface = { workspace = true }
tests_utils    = { workspace = true }

# Local dependencies: Dragonball
dbs-utils = { workspace = true }
dragonball = { workspace = true, features = [
  "atomic-guest-memory",
  "dbs-upcall",
  "host-device",
  "hotplug",
  "vhost-net",
  "vhost-user-net",
  "virtio-balloon",
  "virtio-blk",
  "virtio-fs",
  "virtio-mem",
  "virtio-net",
  "virtio-vsock",
], optional = true }

[features]
default = []

dragonball = ["dep:dragonball"]
# Feature is not yet complete, so not enabled by default.
# See https://github.com/kata-containers/kata-containers/issues/6264.
cloud-hypervisor = ["ch-config"]

[dev-dependencies]
serial_test = "2.0.0"

# Local dev-dependencies
# Force the CH tests to run, even when the feature is not enabled for
# a normal build.
hypervisor = { workspace = true, features = ["cloud-hypervisor"] }
test-utils = { workspace = true }

[build-dependencies]
ttrpc-codegen = "0.4.2"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(feature, values("enable-vendor"))',
] }
