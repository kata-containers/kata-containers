[package]
name = "hypervisor"
version = "0.1.0"
authors = { workspace = true }
edition = { workspace = true }
license = { workspace = true }

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix-rt = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
go-flag = { workspace = true }
libc = { workspace = true }
nix = { workspace = true }
rust-ini = "0.18.0"
seccompiler = "0.5.0"
serde = { workspace = true }
serde_json = { workspace = true }
slog = { workspace = true }
slog-scope = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "fs", "process", "io-util"] }
vmm-sys-util = "0.15.0"
rand = { workspace = true }
path-clean = "1.0.1"
lazy_static = { workspace = true }
tracing = { workspace = true }
ttrpc = { workspace = true, features = ["async"] }
futures = "0.3.25"
safe-path = "0.1.0"
crossbeam-channel = "0.5.6"
qapi = { version = "0.15", features = ["qmp", "async-tokio-all"] }
qapi-spec = "0.3.2"
qapi-qmp = "0.15.0"
hyper = { workspace = true, features = ["client"] }

# Local dependencies
kata-sys-util = { workspace = true }
kata-types = { workspace = true }
logging = { workspace = true }
protocols = { workspace = true, features = ["async"] }
persist = { workspace = true }
tests_utils = { workspace = true }

# Dependencies that only exist to support Dragonball, Firecracker, and
# Cloud Hypervisor. They are listed only for x86_64/aarch64 so unsupported
# targets never resolve those crates even if a developer enables a driver
# feature by mistake. Which features are enabled is controlled from
# `src/runtime-rs/Makefile` (EXTRA_RUSTFEATURES / USE_BUILTIN_DB / USE_EXTERNAL_* / ARCH); Rust
# code gates drivers with `cfg(feature = "...")` only (no `target_arch` cfgs).
[target.'cfg(any(target_arch = "x86_64", target_arch = "aarch64"))'.dependencies]
# Cloud Hypervisor REST schema / client (driver is x86_64+aarch64 only in Kata).
ch-config = { workspace = true, optional = true }
# `dbs-utils` is only used by the dragonball and firecracker drivers
# (both x86_64+aarch64 only). It compiles on every arch, but we have no
# use for it elsewhere, so don't pull it in.
dbs-utils = { workspace = true }
# `hyperlocal` is only used by the firecracker driver (UDS HTTP client).
hyperlocal = { workspace = true }
dragonball = { workspace = true, features = [
    "atomic-guest-memory",
    "virtio-vsock",
    "hotplug",
    "virtio-blk",
    "virtio-net",
    "virtio-fs",
    "vhost-net",
    "dbs-upcall",
    "virtio-mem",
    "virtio-balloon",
    "vhost-user-net",
    "host-device",
], optional = true }

[features]
default = []

dragonball = ["dep:dragonball"]
cloud-hypervisor = ["dep:ch-config"]
firecracker = []
qemu = []

[dev-dependencies]
serial_test = "2.0.0"
tempfile = { workspace = true }

# Local dev-dependencies
hypervisor = { workspace = true, features = ["qemu", "cloud-hypervisor"] }
test-utils = { workspace = true }

[build-dependencies]
ttrpc-codegen = "0.6.0"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(feature, values("enable-vendor"))',
] }
