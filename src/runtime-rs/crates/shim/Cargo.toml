[package]
authors     = ["The Kata Containers community <kata-dev@lists.katacontainers.io>"]
description = "Containerd shim runtime for Kata Containers"
edition     = "2018"
keywords    = ["kata-containers", "shim"]
license     = "Apache-2.0"
name        = "shim"
repository  = "https://github.com/kata-containers/kata-containers.git"
version     = "0.1.0"

[[bin]]
name = "containerd-shim-kata-v2"
path = "src/bin/main.rs"

[dependencies]
anyhow = "^1.0"
backtrace = { version = ">=0.3.35", features = [
  "libbacktrace",
  "libunwind",
  "std",
], default-features = false }
containerd-shim-protos = { version = "0.6.0", features = ["async"] }
go-flag = "0.1.0"
libc = "0.2.108"
log = "0.4.14"
nix = "0.24.2"
oci-spec = { version = "0.6.8", features = ["runtime"] }
protobuf = "=3.7.1"
sha2 = "=0.9.3"
slog = { version = "2.5.2", features = [
  "max_level_trace",
  "release_max_level_trace",
  "std",
] }
slog-async = "2.5.2"
slog-scope = "4.4.0"
slog-stdlog = "4.1.0"
thiserror = "1.0.30"
tokio = { version = "1.38.0", features = ["rt", "rt-multi-thread"] }
tracing = "0.1.36"
tracing-opentelemetry = "0.18.0"
unix_socket2 = "0.5.4"

# Local dependencies
kata-sys-util = { workspace = true }
kata-types    = { workspace = true }
logging       = { workspace = true }
runtime-spec  = { workspace = true }
runtimes      = { workspace = true }
service       = { workspace = true }

[dev-dependencies]
rand        = "0.8.4"
serial_test = "0.5.1"
tempfile    = "3.2.0"

# Local dev-dependencies
tests_utils = { workspace = true }
