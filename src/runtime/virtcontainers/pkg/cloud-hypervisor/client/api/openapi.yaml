      example:
        resume: true
        prefault: true
        source_url: source_url
      properties:
        source_url:
          type: string
        prefault:
          type: boolean
        memory_restore_mode:
          $ref: '#/components/schemas/MemoryRestoreMode'
        resume:
          type: boolean
      required:
      - source_url
      type: object
    ReceiveMigrationData:
      example:
        tls_dir: tls_dir
        receiver_url: receiver_url
      properties:
        receiver_url:
          type: string
        tls_dir:
          description: |
            Directory containing the TLS server certificate (server-cert.pem), the TLS server key (server-key.pem), and the client TLS root CA certificate (ca-cert.pem). TLS is only supported with tcp:<host>:<port> receiver URLs.
          type: string
        memory_mode:
          $ref: '#/components/schemas/MigrationMode'
      required:
      - receiver_url
      type: object
    MigrationMode:
      default: Precopy
      description: |
        Memory transfer mode. Precopy transfers all guest memory before the destination resumes. Postcopy resumes the destination first and faults guest pages in on demand.
      enum:
      - Precopy
      - Postcopy
      type: string
    TimeoutStrategy:
      default: Cancel
      description: |
        The strategy to apply when the migration timeout is reached. Cancel will abort the migration and keep the VM running on the source. Ignore will proceed with the migration regardless of the downtime requirement.
      enum:
      - Cancel
      - Ignore
      type: string
    SendMigrationData:
      example:
        timeout_s: 1
        tls_dir: tls_dir
        destination_url: destination_url
        downtime_ms: 1
        local: true
        connections: 19
      properties:
        destination_url:
          type: string
        local:
          type: boolean
        downtime_ms:
          default: 300
          description: |
            The maximum downtime the migration aims for, in milliseconds. Defaults to 300ms.
          format: int64
          minimum: 1
          type: integer
        timeout_s:
          default: 3600
          description: |
            The timeout for the migration (maximum total duration), in seconds. Defaults to 3600s (one hour).
          format: int64
          minimum: 1
          type: integer
        timeout_strategy:
          $ref: '#/components/schemas/TimeoutStrategy'
        connections:
          default: 1
          description: |
            The number of parallel TCP connections to use for migration. Must be between 1 and 128. Multiple connections are not supported with local UNIX-socket migration.
          format: int64
          maximum: 128
          minimum: 1
          type: integer
        tls_dir:
          description: |
            Directory containing the TLS root CA certificate (ca-cert.pem), the TLS client certificate (client-cert.pem), and TLS client key (client-key.pem). TLS is only supported with tcp:<host>:<port> destination URLs.
          type: string
        memory_mode:
          $ref: '#/components/schemas/MigrationMode'
      required:
      - destination_url
      type: object
