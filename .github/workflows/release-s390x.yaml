name: Publish Kata release artifacts for s390x
on:
  workflow_call:
    inputs:
      target-arch:
        required: true
        type: string
    secrets:
      QUAY_DEPLOYER_PASSWORD:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release-s390x
  cancel-in-progress: false # Note - don't cancel the in progress build as we could end up with inconsistent results

permissions: {}

jobs:
  build-kata-static-tarball-s390x:
    uses: ./.github/workflows/build-kata-static-tarball-s390x.yaml
    with:
      push-to-registry: yes
      stage: release
    secrets:
      QUAY_DEPLOYER_PASSWORD: ${{ secrets.QUAY_DEPLOYER_PASSWORD }}
    permissions:
      contents: read
      packages: write # needed to push build artifacts to ghcr.io
      id-token: write # needed to sign images and generate attestations
      attestations: write # needed to generate artifact attestations


  kata-deploy:
    name: kata-deploy
    needs: build-kata-static-tarball-s390x
    permissions:
      contents: read
      packages: write # needed to push build artifacts to ghcr.io
    runs-on: ubuntu-24.04-s390x
    steps:
      - name: Login to Kata Containers ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Kata Containers quay.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          username: ${{ vars.QUAY_DEPLOYER_USERNAME }}
          password: ${{ secrets.QUAY_DEPLOYER_PASSWORD }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: get-kata-artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: kata-artifacts-s390x-*
          path: tools/packaging/kata-deploy/local-build/build
          merge-multiple: true

      # kata-ctl lives in the kata-tools bundle, not the per-shim component set,
      # so its tarball is uploaded under a separate artifact name. Stage it into
      # the same build dir so it is baked into the kata-deploy image; the
      # installer only extracts it on nodes where debug is enabled.
      - name: get-kata-ctl
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: kata-tools-artifacts-s390x-kata-ctl
          path: tools/packaging/kata-deploy/local-build/build
          merge-multiple: true

      - name: build-and-push-kata-deploy-ci-s390x
        id: build-and-push-kata-deploy-ci-s390x
        env:
          TARGET_ARCH: ${{ inputs.target-arch }}
        run: |
          # We need to do such trick here as the format of the $GITHUB_REF
          # is "refs/tags/<tag>"
          tag=$(echo "$GITHUB_REF" | cut -d/ -f3-)
          if [ "${tag}" = "main" ]; then
              tag=$(./tools/packaging/release/release.sh release-version)
              tags=("${tag}" "latest")
          else
              tags=("${tag}")
          fi
          for tag in "${tags[@]}"; do
              ./tools/packaging/kata-deploy/local-build/kata-deploy-build-and-upload-payload.sh \
                  "ghcr.io/kata-containers/kata-deploy" \
                  "${tag}-${TARGET_ARCH}"
              ./tools/packaging/kata-deploy/local-build/kata-deploy-build-and-upload-payload.sh \
                  "quay.io/kata-containers/kata-deploy" \
                  "${tag}-${TARGET_ARCH}"
          done
