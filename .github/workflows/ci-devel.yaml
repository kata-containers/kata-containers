name: Kata Containers CI (manually triggered)
on:
  workflow_dispatch:
    inputs:
      tee-test-scope:
        description: "TEE test scope: small runs only attestation + policy tests, full runs everything"
        required: false
        type: choice
        options:
          - small
          - full
        default: small

permissions: {}

jobs:
  kata-containers-ci-on-push:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/ci.yaml
    with:
      commit-hash: ${{ github.sha }}
      pr-number: "dev"
      tag: ${{ github.sha }}-dev
      target-branch: ${{ github.ref_name }}
      extensive-matrix-autogenerated-policy: "yes"
      tee-test-scope: ${{ inputs.tee-test-scope || 'small' }}

    secrets:
      AUTHENTICATED_IMAGE_PASSWORD: ${{ secrets.AUTHENTICATED_IMAGE_PASSWORD }}
      AZ_APPID2: ${{ secrets.AZ_APPID2 }}
      AZ_TENANT_ID2: ${{ secrets.AZ_TENANT_ID2 }}
      AZ_SUBSCRIPTION_ID2: ${{ secrets.AZ_SUBSCRIPTION_ID2 }}
      CI_HKD_PATH: ${{ secrets.CI_HKD_PATH }}
      ITA_KEY: ${{ secrets.ITA_KEY }}
      QUAY_DEPLOYER_PASSWORD: ${{ secrets.QUAY_DEPLOYER_PASSWORD }}
      NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
      KBUILD_SIGN_PIN: ${{ secrets.KBUILD_SIGN_PIN }}

  build-checks:
    uses: ./.github/workflows/build-checks.yaml
    with:
      instance: ubuntu-22.04
