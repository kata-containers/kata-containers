name: Build kata-monitor Container Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'feat/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push kata-monitor
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(cat VERSION)
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=v${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/packaging/kata-monitor/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kata-monitor:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/kata-monitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
