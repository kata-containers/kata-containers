name: CI | Run kubernetes tests on IBM Cloud Z virtual server instance (zVSI)
on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      repo:
        required: true
        type: string
      tag:
        required: true
        type: string
      pr-number:
        required: true
        type: string
      commit-hash:
        required: false
        type: string
      target-branch:
        required: false
        type: string
        default: ""
    secrets:
      AUTHENTICATED_IMAGE_PASSWORD:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-zvsi
  cancel-in-progress: true

permissions: {}

jobs:
  run-k8s-tests:
    name: run-k8s-tests
    strategy:
      fail-fast: false
      matrix:
        snapshotter:
          - overlayfs
          - devmapper
          - nydus
        vmm:
          - qemu
          - qemu-runtime-rs
          - qemu-coco-dev
          - qemu-coco-dev-runtime-rs
        k8s:
          - kubeadm
        include:
          - snapshotter: devmapper
            pull-type: default
            snapshotter-cmd: configure-snapshotter
          - snapshotter: nydus
            pull-type: guest-pull
          - snapshotter: nydus
            vmm: qemu-coco-dev-runtime-rs
            is-nightly-only: true
        exclude:
          - snapshotter: overlayfs
            vmm: qemu
          - snapshotter: overlayfs
            vmm: qemu-coco-dev
          - snapshotter: overlayfs
            vmm: qemu-coco-dev-runtime-rs
          - snapshotter: devmapper
            vmm: qemu-runtime-rs
          - snapshotter: devmapper
            vmm: qemu-coco-dev
          - snapshotter: devmapper
            vmm: qemu-coco-dev-runtime-rs
          - snapshotter: nydus
            vmm: qemu
          - snapshotter: nydus
            vmm: qemu-runtime-rs
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.event.pull_request.number || github.ref }}-zvsi-${{ toJSON(matrix) }}
      cancel-in-progress: true
    runs-on: s390x-large
    env:
      DOCKER_REGISTRY: ${{ inputs.registry }}
      DOCKER_REPO: ${{ inputs.repo }}
      DOCKER_TAG: ${{ inputs.tag }}
      GH_PR_NUMBER: ${{ inputs.pr-number }}
      KATA_HOST_OS: "ubuntu"
      KATA_HYPERVISOR: ${{ matrix.vmm }}
      KUBERNETES: ${{ matrix.k8s }}
      PULL_TYPE: ${{ matrix.pull-type }}
      SNAPSHOTTER: ${{ matrix.snapshotter }}
      TARGET_ARCH: "s390x"
      AUTHENTICATED_IMAGE_USER: ${{ vars.AUTHENTICATED_IMAGE_USER }}
      AUTHENTICATED_IMAGE_PASSWORD: ${{ secrets.AUTHENTICATED_IMAGE_PASSWORD }}
    steps:
      - name: Check if job should run
        id: should-run
        env:
          IS_NIGHTLY_ONLY: ${{ matrix.is-nightly-only }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          if [ "${IS_NIGHTLY_ONLY}" = "true" ] && [ "${PR_NUMBER}" != "nightly" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Skipping nightly-only job for non-nightly run"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.should-run.outputs.skipped != 'true' }}
        with:
          ref: ${{ inputs.commit-hash }}
          fetch-depth: 0
          persist-credentials: false

      - name: Rebase atop of the latest target branch
        if: ${{ steps.should-run.outputs.skipped != 'true' }}
        run: |
          ./tests/git-helper.sh "rebase-atop-of-the-latest-target-branch"
        env:
          TARGET_BRANCH: ${{ inputs.target-branch }}

      - name: Set SNAPSHOTTER to empty if overlayfs
        if: ${{ steps.should-run.outputs.skipped != 'true' && matrix.snapshotter == 'overlayfs' }}
        run: echo "SNAPSHOTTER=" >> "$GITHUB_ENV"

      - name: Set KBS and KBS_INGRESS if qemu-coco-dev
        if: ${{ steps.should-run.outputs.skipped != 'true' && (matrix.vmm == 'qemu-coco-dev' || matrix.vmm == 'qemu-coco-dev-runtime-rs') }}
        run: |
          echo "KBS=true" >> "$GITHUB_ENV"
          echo "KBS_INGRESS=nodeport" >> "$GITHUB_ENV"

      # qemu-runtime-rs only works with overlayfs
      # See: https://github.com/kata-containers/kata-containers/issues/10066
      - name: Configure the ${{ matrix.snapshotter }} snapshotter
        if: ${{ steps.should-run.outputs.skipped != 'true' && matrix.snapshotter != 'overlayfs' && matrix.snapshotter-cmd != '' }}
        env:
          SNAPSHOTTER_CMD: ${{ matrix.snapshotter-cmd }}
        run: bash tests/integration/kubernetes/gha-run.sh "${SNAPSHOTTER_CMD}"

      - name: Deploy Kata
        if: ${{ steps.should-run.outputs.skipped != 'true' }}
        timeout-minutes: 20
        run: bash tests/integration/kubernetes/gha-run.sh deploy-kata-zvsi

      - name: Uninstall previous `kbs-client`
        if: ${{ steps.should-run.outputs.skipped != 'true' && (matrix.vmm == 'qemu-coco-dev' || matrix.vmm == 'qemu-coco-dev-runtime-rs') }}
        timeout-minutes: 10
        run: bash tests/integration/kubernetes/gha-run.sh uninstall-kbs-client

      - name: Deploy CoCo KBS
        if: ${{ steps.should-run.outputs.skipped != 'true' && (matrix.vmm == 'qemu-coco-dev' || matrix.vmm == 'qemu-coco-dev-runtime-rs') }}
        timeout-minutes: 10
        run: bash tests/integration/kubernetes/gha-run.sh deploy-coco-kbs

      - name: Install `kbs-client`
        if: ${{ steps.should-run.outputs.skipped != 'true' && (matrix.vmm == 'qemu-coco-dev' || matrix.vmm == 'qemu-coco-dev-runtime-rs') }}
        timeout-minutes: 10
        run: bash tests/integration/kubernetes/gha-run.sh install-kbs-client

      - name: Run tests
        if: ${{ steps.should-run.outputs.skipped != 'true' }}
        timeout-minutes: 60
        run: bash tests/integration/kubernetes/gha-run.sh run-tests

      - name: Report tests
        if: ${{ always() && steps.should-run.outputs.skipped != 'true' }}
        run: bash tests/integration/kubernetes/gha-run.sh report-tests

      - name: Delete kata-deploy
        if: ${{ always() && steps.should-run.outputs.skipped != 'true' }}
        timeout-minutes: 10
        run: bash tests/integration/kubernetes/gha-run.sh cleanup-zvsi

      - name: Delete CoCo KBS
        if: ${{ always() && steps.should-run.outputs.skipped != 'true' }}
        timeout-minutes: 10
        run: |
          if [ "${KBS}" == "true" ]; then
            bash tests/integration/kubernetes/gha-run.sh delete-coco-kbs
          fi
