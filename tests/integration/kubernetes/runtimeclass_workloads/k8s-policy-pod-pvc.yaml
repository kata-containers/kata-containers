apiVersion: v1
kind: Pod
metadata:
  name: policy-pod-pvc
spec:
  runtimeClassName: kata
  containers:
    - name: busybox
      image: "quay.io/prometheus/busybox:latest"
      volumeDevices:
        - name: dev
          devicePath: /dev/csi0
      resources:
        limits:
          memory: 2Gi
  volumes:
    - name: dev
      persistentVolumeClaim:
        claimName: policy-dev
