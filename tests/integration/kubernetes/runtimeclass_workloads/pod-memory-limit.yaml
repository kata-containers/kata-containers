apiVersion: v1
kind: Pod
metadata:
  name: memory-test
spec:
  runtimeClassName: kata
  containers:
  - name: memory-test-ctr
    image: quay.io/kata-containers/sysbench-kata:latest
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        memory: "${memory_size}"
      # k8s-memory.bats renders different limits against this fixed request:
      # lower values must be rejected, valid higher values should be accepted.
      requests:
        memory: "700Mi"
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "${memory_allocated}", "--vm-hang", "1"]
