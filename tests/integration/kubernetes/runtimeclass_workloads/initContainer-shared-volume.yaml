apiVersion: v1
kind: Pod
metadata:
  name: initcontainer-shared-volume
spec:
  runtimeClassName: kata
  initContainers:
  - name: first
    image: quay.io/prometheus/busybox:latest
    # TODO: remove this sleep command after fixing https://github.com/kata-containers/kata-containers/issues/12589
    command: [ "sh", "-c", "sleep 1s ; echo ${EPOCHREALTIME//.} > /volume/initContainer" ]
    volumeMounts:
      - mountPath: /volume
        name: volume
  containers:
  - name: last
    image: quay.io/prometheus/busybox:latest
    command: [ "sh", "-c", "echo ${EPOCHREALTIME//.} > /volume/container; tail -f /dev/null" ]
    volumeMounts:
    - mountPath: /volume
      name: volume
  volumes:
  - name: volume
    emptyDir: {}
