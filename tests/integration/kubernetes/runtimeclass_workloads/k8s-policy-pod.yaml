apiVersion: v1
kind: Pod
metadata:
  name: policy-pod
spec:
  terminationGracePeriodSeconds: 0
  runtimeClassName: kata
  containers:
    - name: busybox
      image: quay.io/prometheus/busybox:latest
      env:
        - name: KUBE_CONFIG_1
          valueFrom:
            configMapKeyRef:
              name: policy-configmap
              key: data-1
        - name: KUBE_CONFIG_2
          valueFrom:
            configMapKeyRef:
              name: policy-configmap
              key: data-2
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      envFrom:
      - configMapRef:
          name: policy-configmap
      command: [ "sh", "-c" ]
      args:
        - |
          if [ "$(printenv data-3)" != "value-3" ]; then
            echo "Environment variable data-3 is not set to value-3"
            exit 1
          else
            echo "Environment variable data-3 is correctly set to value-3"
            sleep 3600  # Keep the pod running for observation
          fi