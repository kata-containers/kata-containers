apiVersion: v1
kind: Pod
metadata:
  name: privileged
spec:
  runtimeClassName: kata
  securityContext:
    supplementalGroups: [10]
  restartPolicy: Never
  containers:
  - image: quay.io/prometheus/busybox:latest
    name: container
    securityContext:
      privileged: true
