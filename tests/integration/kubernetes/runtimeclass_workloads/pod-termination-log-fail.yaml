apiVersion: v1
kind: Pod
metadata:
  name: pod-termination-log-fail
spec:
  runtimeClassName: kata
  restartPolicy: Never
  containers:
    - name: termination-log-test
      image: quay.io/prometheus/busybox:latest
      command: ["/bin/sh"]
      args: ["-c", "echo 'failure exit message' > /dev/termination-log; exit 1"]
