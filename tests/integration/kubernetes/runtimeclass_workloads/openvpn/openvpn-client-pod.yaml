apiVersion: v1
kind: Pod
metadata:
  name: openvpn-client
  labels:
    app: openvpn-client
spec:
  containers:
  - name: openvpn-client
    image: alpine:3.19
    command:
    - /bin/sh
    - -c
    - |
      for i in 1 2 3; do apk add --no-cache openvpn && break || sleep 3; done
      openvpn --config /vpn/client.ovpn
    securityContext:
      privileged: false
      capabilities:
        add:
          - NET_ADMIN
    volumeMounts:
    - name: openvpn-config
      mountPath: /vpn
    - name: openvpn-secrets
      mountPath: /vpn/keys
      readOnly: true
    - name: dev-net-tun
      mountPath: /dev/net/tun
    env:
    - name: VPN_CONFIG
      value: "/vpn/client.ovpn"
    readinessProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - "ip a | grep tap0"
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 3
  volumes:
  - name: openvpn-config
    configMap:
      name: openvpn-client-config
  - name: openvpn-secrets
    secret:
      secretName: openvpn-client-secrets
  - name: dev-net-tun
    hostPath:
      path: /dev/net/tun
      type: CharDevice
  runtimeClassName: kata
