apiVersion: v1
kind: Pod
metadata:
  name: default-cpu-test
spec:
  runtimeClassName: kata
  securityContext:
    supplementalGroups: [10]
  containers:
  - name: default-cpu-demo-ctr
    image: quay.io/prometheus/busybox:latest
    command: ["tail", "-f", "/dev/null"]
    resources:
      limits:
        memory: "128Mi"
      requests:
        memory: "64Mi"
