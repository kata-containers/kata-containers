apiVersion: v1
kind: Pod
metadata:
  name: tcptest
  labels:
    app: tcp-liveness
spec:
  runtimeClassName: kata
  securityContext:
    supplementalGroups: [1, 2, 3, 4, 6, 10, 11, 20, 26, 27]
  containers:
  - name: tcp-liveness
    image: ${agnhost_image}
    command:
      - /agnhost
    args:
    - liveness
    ports:
    - containerPort: 8080
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
