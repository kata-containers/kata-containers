apiVersion: v1
kind: Pod
metadata:
  labels:
    test: liveness-test
  name: liveness-http
spec:
  runtimeClassName: kata
  securityContext:
    supplementalGroups: [1, 2, 3, 4, 6, 10, 11, 20, 26, 27]
  containers:
  - name: liveness
    image: ${agnhost_image}
    command:
      - /agnhost
    args:
    - liveness
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 3
      periodSeconds: 3
