apiVersion: v1
kind: Namespace
metadata:
  name: kata-system

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/name: kata-monitor
  name: kata-monitor
  namespace: kata-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kata-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kata-monitor
      annotations:
        prometheus.io/scrape: "true"
    spec:
      containers:
      - name: kata-monitor
        image: quay.io/kata-containers/kata-deploy:3.31.0
        command: ["/opt/kata/bin/kata-monitor"]
        args:
          - -listen-address=0.0.0.0:8090
          - -log-level=debug
          - -runtime-endpoint=unix:///run/containerd/containerd.sock
        ports:
          - containerPort: 8090
        resources:
          limits:
            cpu: 200m
            memory: 300Mi
          requests:
            cpu: 200m
            memory: 300Mi
        volumeMounts:
        - name: opt-kata
          mountPath: /opt/kata
          readOnly: true
        - name: containerd-sock
          mountPath: /run/containerd
          readOnly: true
        - name: sbs
          mountPath: /run/vc/sbs/
          readOnly: true
        - name: host-lib
          mountPath: /lib
          readOnly: true
        - name: host-lib64
          mountPath: /lib64
          readOnly: true
      terminationGracePeriodSeconds: 30
      volumes:
      - name: opt-kata
        hostPath:
          path: /opt/kata
          type: Directory
      - name: containerd-sock
        hostPath:
          path: /run/containerd
          type: Directory
      - name: sbs
        hostPath:
          path: /run/vc/sbs/
          type: DirectoryOrCreate
      - name: host-lib
        hostPath:
          path: /lib
          type: Directory
      - name: host-lib64
        hostPath:
          path: /lib64
          type: Directory
